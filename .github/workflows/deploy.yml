name: Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Cloud Foundry CLI v8
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo gpg --dearmor -o /usr/share/keyrings/cli.cloudfoundry.org.gpg
          echo "deb [signed-by=/usr/share/keyrings/cli.cloudfoundry.org.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli

      - name: Run tests before deploy
        run: python -m unittest discover -s tests -v

      - name: Log in to Cloud Foundry
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          CF_API="${CF_API//$'\r'/}"
          CF_API="${CF_API//$'\n'/}"
          CF_API="${CF_API%/}"
          CF_USERNAME="${CF_USERNAME//$'\r'/}"
          CF_USERNAME="${CF_USERNAME//$'\n'/}"
          CF_PASSWORD="${CF_PASSWORD//$'\r'/}"
          CF_PASSWORD="${CF_PASSWORD//$'\n'/}"
          CF_ORG="${CF_ORG//$'\r'/}"
          CF_ORG="${CF_ORG//$'\n'/}"
          CF_SPACE="${CF_SPACE//$'\r'/}"
          CF_SPACE="${CF_SPACE//$'\n'/}"
          cf api "$CF_API"
          cf auth
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      - name: Push app without starting
        run: cf push --no-start

      - name: Set production environment variables
        env:
          SAP_SOC_BASE_URL: ${{ vars.SAP_SOC_BASE_URL }}
          SAP_SOC_TOKEN: ${{ secrets.SAP_SOC_TOKEN }}
          STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'hana' }}
          SQLITE_PATH: ${{ vars.SQLITE_PATH || './pipeline.db' }}
          HANA_HOST: ${{ vars.HANA_HOST }}
          HANA_PORT: ${{ vars.HANA_PORT || '443' }}
          HANA_USER: ${{ vars.HANA_USER }}
          HANA_PASSWORD: ${{ secrets.HANA_PASSWORD }}
          HANA_SCHEMA: ${{ vars.HANA_SCHEMA || 'SOC_PIPELINE' }}
          HANA_ENCRYPT: ${{ vars.HANA_ENCRYPT || 'true' }}
          HANA_VALIDATE_CERTIFICATE: ${{ vars.HANA_VALIDATE_CERTIFICATE || 'false' }}
          ENABLE_WORKER: ${{ vars.ENABLE_WORKER || 'true' }}
          POLL_INTERVAL_MINUTES: ${{ vars.POLL_INTERVAL_MINUTES || '5' }}
          REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '30' }}
          MAX_RETRIES: ${{ vars.MAX_RETRIES || '3' }}
          RETRY_BACKOFF_SECONDS: ${{ vars.RETRY_BACKOFF_SECONDS || '2' }}
          ERROR_SECURITY_THRESHOLD: ${{ vars.ERROR_SECURITY_THRESHOLD || '40' }}
          ATTACK_SCORE_THRESHOLD: ${{ vars.ATTACK_SCORE_THRESHOLD || '70' }}
          MODEL_ENABLED: ${{ vars.MODEL_ENABLED || 'true' }}
          MODEL_ALGORITHM: ${{ vars.MODEL_ALGORITHM || 'hybrid' }}
          MODEL_MIN_TRAINING_ROWS: ${{ vars.MODEL_MIN_TRAINING_ROWS || '30' }}
          MODEL_CONTAMINATION: ${{ vars.MODEL_CONTAMINATION || '0.15' }}
          MODEL_KMEANS_CLUSTERS: ${{ vars.MODEL_KMEANS_CLUSTERS || '4' }}
          MODEL_HISTORY_LIMIT: ${{ vars.MODEL_HISTORY_LIMIT || '200' }}
        run: |
          cf set-env Perritos-backend SAP_SOC_BASE_URL "$SAP_SOC_BASE_URL"
          cf set-env Perritos-backend SAP_SOC_TOKEN "$SAP_SOC_TOKEN"
          cf set-env Perritos-backend STORAGE_BACKEND "$STORAGE_BACKEND"
          cf set-env Perritos-backend SQLITE_PATH "$SQLITE_PATH"
          cf set-env Perritos-backend HANA_HOST "$HANA_HOST"
          cf set-env Perritos-backend HANA_PORT "$HANA_PORT"
          cf set-env Perritos-backend HANA_USER "$HANA_USER"
          cf set-env Perritos-backend HANA_PASSWORD "$HANA_PASSWORD"
          cf set-env Perritos-backend HANA_SCHEMA "$HANA_SCHEMA"
          cf set-env Perritos-backend HANA_ENCRYPT "$HANA_ENCRYPT"
          cf set-env Perritos-backend HANA_VALIDATE_CERTIFICATE "$HANA_VALIDATE_CERTIFICATE"
          cf set-env Perritos-backend ENABLE_WORKER "$ENABLE_WORKER"
          cf set-env Perritos-backend POLL_INTERVAL_MINUTES "$POLL_INTERVAL_MINUTES"
          cf set-env Perritos-backend REQUEST_TIMEOUT_SECONDS "$REQUEST_TIMEOUT_SECONDS"
          cf set-env Perritos-backend MAX_RETRIES "$MAX_RETRIES"
          cf set-env Perritos-backend RETRY_BACKOFF_SECONDS "$RETRY_BACKOFF_SECONDS"
          cf set-env Perritos-backend ERROR_SECURITY_THRESHOLD "$ERROR_SECURITY_THRESHOLD"
          cf set-env Perritos-backend ATTACK_SCORE_THRESHOLD "$ATTACK_SCORE_THRESHOLD"
          cf set-env Perritos-backend MODEL_ENABLED "$MODEL_ENABLED"
          cf set-env Perritos-backend MODEL_ALGORITHM "$MODEL_ALGORITHM"
          cf set-env Perritos-backend MODEL_MIN_TRAINING_ROWS "$MODEL_MIN_TRAINING_ROWS"
          cf set-env Perritos-backend MODEL_CONTAMINATION "$MODEL_CONTAMINATION"
          cf set-env Perritos-backend MODEL_KMEANS_CLUSTERS "$MODEL_KMEANS_CLUSTERS"
          cf set-env Perritos-backend MODEL_HISTORY_LIMIT "$MODEL_HISTORY_LIMIT"

      - name: Start application with updated environment
        run: cf start Perritos-backend

      - name: Smoke test deployed health endpoint
        env:
          APP_HEALTH_URL: ${{ vars.APP_HEALTH_URL }}
        run: |
          APP_HEALTH_URL="${APP_HEALTH_URL//$'\r'/}"
          APP_HEALTH_URL="${APP_HEALTH_URL//$'\n'/}"
          if [ -z "$APP_HEALTH_URL" ]; then
            APP_ROUTE="$(cf app Perritos-backend | awk '/^routes:/ {print $2; exit}')"
            APP_HEALTH_URL="https://${APP_ROUTE}/health"
          fi
          curl --fail --silent --show-error "$APP_HEALTH_URL"
